name: Dev CI

on:
  push:
    branches: [ dev ]
    
jobs:
  test-and-ff:
    runs-on: ubuntu-latest
    permissions: 
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: tests
        run: |
          pytest test/ -v
        continue-on-error: true

      - name: Fast-forward master into dev
        if: steps.tests.outcome == 'success'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git push origin "${{ github.sha }}:master"


      - name: Tests failed → creating failure branch and rolling back dev
        if: failure()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          SHORT_SHA=$(git rev-parse --short HEAD)
          FAILURE_BRANCH="failure/${SHORT_SHA}"
          DEV_BRANCH="dev"
          
          PREV_SHA=$(git rev-parse HEAD^)

          echo "Tests failed on commit ${SHORT_SHA}. Creating branch ${FAILURE_BRANCH}"

          git checkout -b $FAILURE_BRANCH
          git push origin $FAILURE_BRANCH

          git checkout $DEV_BRANCH
          git reset --hard $PREV_SHA
          git push origin $DEV_BRANCH --force